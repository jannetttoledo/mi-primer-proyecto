<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pregunta Importante</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Aquí aplicamos la nueva letra */
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            background-color: #ffe6ea; 
            text-align: center;
            padding-top: 60px;
            padding-bottom: 60px;
            margin: 0;
        }
        .contenedor {
            background-color: white; 
            display: inline-block;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            text-align: center;
            min-height: 300px;
            transition: all 0.3s ease;
        }
        .icono-gato {
            font-size: 60px;
            margin-bottom: 15px;
        }
        h1 {
            color: #ff4d6d;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .pregunta-texto {
            font-size: 19px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 400;
            padding: 0 10px;
        }
        .seccion-logistica {
            display: none; 
            text-align: left;
            animation: aparecer 0.5s ease forwards;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .campo-formulario {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        select, input {
            font-family: 'Fredoka', sans-serif;
            padding: 12px;
            font-size: 15px;
            border-radius: 10px;
            border: 2px solid #ffd0d6;
            background-color: #fffafb;
            color: #333;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #ff4d6d;
        }
        .botones {
            margin-top: 20px;
            height: 60px; 
            position: relative;
        }
        button {
            font-family: 'Fredoka', sans-serif;
            padding: 14px 28px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        #btnSi {
            background-color: #4cc9f0; 
            color: white;
            margin-right: 15px;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        #btnSi:hover {
            background-color: #3a97bd;
            transform: scale(1.05);
        }
        #btnNo {
            background-color: #ff4d6d; 
            color: white;
        }
        #btnConfirmar {
            background-color: #4cc9f0;
            color: white;
            width: 100%;
            margin-top: 15px;
        }
        #btnConfirmar:hover {
            background-color: #3a97bd;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="icono-gato">🐱✨</div>
        
        <div id="pantallaPregunta">
            <h1>Tengo una pregunta bien importante...</h1>
            <div class="pregunta-texto">
                ¿Quieres salir a comer algo conmigo y conocernos antes de que sea el fin del mundo? 🍕🍰🥤
            </div>
            
            <div class="botones">
                <button id="btnSi" onclick="mostrarLogistica()">¡SÍ, CLARO!</button>
                <button id="btnNo" onmouseover="moverBotonNo()">NO</button>
            </div>
        </div>

        <div id="pantallaLogistica" class="seccion-logistica">
            <h1 style="font-size: 24px; margin-bottom: 25px;">¡Excelente elección! ✨</h1>
            
            <div class="campo-formulario">
                <label for="fechaHora">1. ¿Qué día y a qué hora puedes?</label>
                <input type="datetime-local" id="fechaHora" value="2026-06-27T17:00" min="2026-06-24T00:00" max="2026-12-31T23:59">
            </div>

            <div class="campo-formulario">
                <label for="puntoEncuentro">2. Elige un punto medio para encontrarnos:</label>
                <select id="puntoEncuentro">
                    <option value="Plaza Vea de Ventanilla">Plaza Vea de Ventanilla</option>
                    <option value="MegaPlaza (Norte)">MegaPlaza (Norte)</option>
                    <option value="Plaza San Miguel">Plaza San Miguel</option>
                    <option value="Real Plaza Centro Cívico">Real Plaza Centro Cívico</option>
                </select>
            </div>
            
            <button id="btnConfirmar" onclick="finalizarCita()">¡ASEGURAR SALIDA! 🚀</button>
        </div>
    </div>

    <script>
        function mostrarLogistica() {
            document.getElementById('pantallaPregunta').style.display = 'none';
            document.getElementById('pantallaLogistica').style.display = 'block';
        }

        function finalizarCita() {
            const lugar = document.getElementById('puntoEncuentro').value;
            const fechaInput = document.getElementById('fechaHora').value;
            
            // Validamos el año por JS si lo ingresan manualmente
            const fechaSeleccionada = new Date(fechaInput);
            const anio = fechaSeleccionada.getFullYear();

            if (anio !== 2026) {
                alert("¡Hey! El fin del mundo es este año. ¡Por favor elige una fecha del 2026! 🌍💥");
                document.getElementById('fechaHora').value = "2026-06-27T17:00"; // Resetea al valor por defecto
                return;
            }

            const fechaFormateada = fechaSeleccionada.toLocaleString('es-PE', {
                weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: 'numeric'
            });

            alert("¡Bien hecho! Salida asegurada antes del fin del mundo 🕶️🔥\n\n" +
                  "📍 Punto de encuentro: " + lugar + "\n" +
                  "⏰ Fecha y hora: " + fechaFormateada + "\n\n" +
                  "¡Mándame captura por WhatsApp para quedar listos! 😉");
        }

        function moverBotonNo() {
            const btnNo = document.getElementById('btnNo');
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.position = 'absolute';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>

</body>
</html>
